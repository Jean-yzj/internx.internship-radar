<!--
  分析（可選）：目前兩個方案，挑一個把註解拿掉即可啟用。都無 cookie。

  A) Plausible Analytics — https://plausible.io （30 天試用，之後 €9/月）

  B) Cloudflare Web Analytics — 永久免費，註冊後把 token 填入
     https://dash.cloudflare.com/?to=/:account/web-analytics
     <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
             data-cf-beacon='{"token": "YOUR_TOKEN_HERE"}'></script>
-->

<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --bg-soft: #f4f4f5;
    --panel: #ffffff;
    --panel-hover: #fafafa;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --ring: rgba(79, 70, 229, 0.2);
    --text: #18181b;
    --text-muted: #52525b;
    --text-faint: #a1a1aa;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --accent-soft: #eef2ff;
    --salary: #059669;
    --new: #10b981;
    --new-soft: #d1fae5;
    --warn: #d97706;
    --warn-soft: #fef3c7;
    --urgent: #dc2626;
    --urgent-soft: #fee2e2;
    --star: #f59e0b;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #09090b;
      --bg-soft: #18181b;
      --panel: #141417;
      --panel-hover: #1c1c21;
      --border: #27272a;
      --border-strong: #3f3f46;
      --ring: rgba(129, 140, 248, 0.3);
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --text-faint: #71717a;
      --accent: #818cf8;
      --accent-hover: #a5b4fc;
      --accent-soft: #1e1b4b;
      --salary: #34d399;
      --new: #34d399;
      --new-soft: #064e3b;
      --warn: #fbbf24;
      --warn-soft: #422006;
      --urgent: #f87171;
      --urgent-soft: #450a0a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    }
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  /* ─────────── Icon base ─────────── */
  .ic {
    width: 1em;
    height: 1em;
    display: inline-block;
    vertical-align: -0.14em;
    flex-shrink: 0;
  }
  .ic-sm { width: 0.85em; height: 0.85em; }
  .ic-lg { width: 1.2em; height: 1.2em; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .container { max-width: 1120px; margin: 0 auto; padding: 0 20px; }
  @media (max-width: 480px) { .container { padding: 0 14px; } }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ─────────────────── Hero ─────────────────── */
  .hero {
    padding: 40px 0 28px;
    background: linear-gradient(180deg, rgba(79, 70, 229, 0.04), transparent);
  }
  @media (max-width: 640px) { .hero { padding: 24px 0 16px; } }
  @media (prefers-color-scheme: dark) {
    .hero { background: linear-gradient(180deg, rgba(129, 140, 248, 0.08), transparent); }
  }
  .hero-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  @media (max-width: 640px) { h1 { font-size: 22px; } }
  h1 .dot {
    width: 9px; height: 9px; border-radius: 999px;
    background: var(--new);
    box-shadow: 0 0 0 4px var(--new-soft);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
  .sub {
    margin: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  @media (max-width: 640px) { .sub { font-size: 12.5px; } }

  .hero-stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-muted);
  }
  .hero-stats strong { color: var(--text); font-weight: 600; font-size: 15px; margin-right: 2px; }
  .hero-stats .hero-cat {
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
    font-size: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 2px;
    border-bottom: 1px dashed transparent;
    line-height: inherit;
  }
  .hero-stats .hero-cat:hover { border-bottom-color: currentColor; }
  @media (max-width: 640px) { .hero-stats { width: 100%; margin-top: 8px; } }

  /* ─────────────────── Toolbar ─────────────────── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
  }
  .toolbar-inner {
    display: grid;
    grid-template-columns: minmax(200px, 2fr) repeat(6, minmax(100px, 1fr));
    gap: 8px;
  }
  @media (max-width: 1040px) {
    .toolbar-inner { grid-template-columns: repeat(3, 1fr); }
    .search-wrap { grid-column: 1 / -1; }
  }
  @media (max-width: 480px) {
    .toolbar-inner { grid-template-columns: 1fr 1fr; gap: 6px; }
  }

  .search-wrap { position: relative; }
  .search-wrap::before {
    content: "";
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    opacity: 0.55;
    pointer-events: none;
    background-color: currentColor;
    mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
    -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
    mask-repeat: no-repeat;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-size: contain;
  }
  .search-wrap kbd {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    padding: 2px 6px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-faint);
    font-family: inherit;
  }
  @media (hover: none), (max-width: 640px) { .search-wrap kbd { display: none; } }

  .toolbar input, .toolbar select {
    height: 40px;
    padding: 0 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--panel);
    color: var(--text);
    font-family: inherit;
    width: 100%;
    transition: border-color 0.1s, box-shadow 0.1s;
    appearance: none;
    -webkit-appearance: none;
  }
  @media (max-width: 640px) { .toolbar input, .toolbar select { font-size: 16px; } }
  .search-wrap input { padding-left: 36px; padding-right: 44px; }
  @media (max-width: 640px) { .search-wrap input { padding-right: 12px; } }
  .toolbar input:focus, .toolbar select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--ring);
  }
  .toolbar select {
    padding-right: 28px;
    background-image: linear-gradient(45deg, transparent 50%, currentColor 50%),
                      linear-gradient(-45deg, transparent 50%, currentColor 50%);
    background-position: calc(100% - 15px) 55%, calc(100% - 10px) 55%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    color: var(--text-muted);
  }

  /* ─────────────────── Category bar ─────────────────── */
  .cat-bar {
    display: flex;
    gap: 6px;
    padding: 14px 0 0;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
    align-items: center;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  @media (max-width: 640px) {
    .cat-bar {
      margin: 0 -14px;
      padding-left: 14px;
      padding-right: 14px;
      mask-image: linear-gradient(to right, transparent, black 14px, black calc(100% - 14px), transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 14px, black calc(100% - 14px), transparent);
    }
  }
  .chip {
    flex-shrink: 0;
    scroll-snap-align: start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 11px;
    height: 32px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
    font-family: inherit;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
    white-space: nowrap;
    line-height: 1;
  }
  .chip > * { flex-shrink: 0; }
  .chip:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: var(--bg-soft);
  }
  .chip.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .chip.empty { opacity: 0.4; }
  .chip.empty:hover { opacity: 0.7; }
  .chip .ic-slot { display: inline-flex; align-items: center; line-height: 0; }
  .chip.active .ic-slot { color: var(--bg) !important; }
  .chip .ic { width: 14px; height: 14px; }
  .chip .count {
    font-size: 11px;
    opacity: 0.6;
    font-weight: 500;
    padding-left: 2px;
  }
  .chip.active .count { opacity: 0.8; }
  .chip .dot {
    width: 7px; height: 7px; border-radius: 999px;
    background: currentColor;
    opacity: 0.85;
  }

  /* ─────────────────── Saved searches ─────────────────── */
  .saved {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    padding: 10px 0 0;
    font-size: 12px;
  }
  /* 空 saved-wrap 完全不佔空間，避免 chip 和清單間出現多餘垂直間距 */
  .saved:empty { display: none; }
  .saved-label {
    color: var(--text-faint);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .saved-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 12px;
    border-radius: 999px;
    background: var(--bg-soft);
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 12px;
  }
  .saved-btn:hover { color: var(--text); border-color: var(--border); }
  .saved-btn .badge {
    background: var(--new);
    color: white;
    border-radius: 999px;
    padding: 1px 6px;
    font-size: 10.5px;
    font-weight: 600;
  }
  .saved-btn .x-btn {
    display: inline-flex;
    align-items: center;
    color: var(--text-faint);
    padding: 0 2px;
    line-height: 0;
  }
  .saved-btn .x-btn:hover { color: var(--urgent); }
  .saved-add {
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px dashed var(--accent);
    font-size: 12px;
    font-weight: 500;
  }
  .saved-add:hover { background: var(--accent); color: white; }

  /* ─────────────────── Result info ─────────────────── */
  .result-info {
    font-size: 12.5px;
    color: var(--text-muted);
    margin: 12px 0 8px;
  }

  /* ─────────────────── Company aggregation page ─────────────────── */
  #company-header { padding: 20px 0 8px; }
  .company-back {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 18px;
    padding: 6px 10px 6px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .company-back:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg-soft); }
  .company-back .ic { width: 14px; height: 14px; }

  .company-hero {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 18px;
  }
  .company-avatar {
    width: 64px; height: 64px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-size: 26px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .company-name {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .company-sub {
    margin: 0;
    font-size: 13px;
    color: var(--text-muted);
  }
  @media (max-width: 480px) {
    .company-avatar { width: 52px; height: 52px; font-size: 22px; }
    .company-name { font-size: 20px; }
  }

  .company-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  @media (max-width: 640px) { .company-stats { grid-template-columns: repeat(2, 1fr); } }
  .company-stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .company-stat .label {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .company-stat .value {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .company-stat .value.dim { color: var(--text-muted); font-size: 14px; font-weight: 500; }

  .company-cats {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .company-cats h4 {
    margin: 0 0 10px;
    font-size: 12.5px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .company-cats .bar {
    display: flex;
    height: 6px;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 10px;
    background: var(--bg-soft);
  }
  .company-cats .bar-seg { height: 100%; }
  .company-cats .legend {
    display: flex;
    gap: 12px 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-muted);
  }
  .company-cats .legend .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }
  .company-cats .legend strong { color: var(--text); font-weight: 600; margin-left: 3px; }

  /* ─────────────────── Jobs list ─────────────────── */
  main { padding-bottom: 80px; }
  .jobs {
    display: grid;
    gap: 8px;
  }
  .job {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 44px 1fr 36px;
    gap: 4px 14px;
    align-items: start;
    border-left-width: 3px;
    transition: border-color 0.1s, box-shadow 0.1s, background 0.1s;
  }
  .job:hover {
    box-shadow: var(--shadow-md);
    background: var(--panel-hover);
  }
  @media (max-width: 480px) {
    .job {
      grid-template-columns: 36px 1fr auto;
      padding: 12px 14px;
      gap: 4px 10px;
      border-radius: 10px;
    }
  }

  /* Avatar: first letter, bg hashed by company name */
  .job-avatar {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 18px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.01em;
    flex-shrink: 0;
    user-select: none;
    line-height: 1;
  }
  @media (max-width: 480px) { .job-avatar { width: 36px; height: 36px; font-size: 15px; border-radius: 8px; } }

  .job-body { min-width: 0; }

  .job-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .job-title {
    margin: 0;
    font-size: 15.5px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px 8px;
    min-width: 0;
  }
  @media (max-width: 480px) { .job-title { font-size: 14.5px; gap: 5px 6px; } }
  .job-title a { color: inherit; }
  .job-title a:hover { color: var(--accent); }

  .job-salary {
    font-size: 14px;
    font-weight: 600;
    color: var(--salary);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .job-salary.neg { color: var(--text-faint); font-weight: 400; }
  @media (max-width: 480px) { .job-salary { font-size: 13px; } }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .badge-new { background: var(--new-soft); color: var(--new); }
  .badge-deadline { background: var(--warn-soft); color: var(--warn); }
  .badge-deadline.urgent { background: var(--urgent-soft); color: var(--urgent); }
  .badge-deadline.expired { background: var(--bg-soft); color: var(--text-faint); }
  .badge-elig { background: var(--accent-soft); color: var(--accent); }

  .job-meta {
    margin-top: 5px;
    font-size: 12.5px;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 3px 10px;
    align-items: center;
    min-width: 0;
  }
  @media (max-width: 480px) { .job-meta { font-size: 12px; gap: 2px 8px; } }
  .job-meta > * { display: inline-flex; align-items: center; gap: 3px; }
  .company-link {
    color: var(--text-muted);
    border-bottom: 1px dashed transparent;
    cursor: pointer;
  }
  .company-link:hover { color: var(--accent); border-color: var(--accent); }
  .meta-sep {
    display: inline-block;
    width: 3px; height: 3px;
    background: var(--text-faint);
    border-radius: 999px;
    opacity: 0.4;
    vertical-align: middle;
  }
  .meta-platform {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--bg-soft);
    color: var(--text-faint);
    font-weight: 500;
  }

  .job-skills {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .skill-tag {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 500;
    background: var(--bg-soft);
    color: var(--text-muted);
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.1s, color 0.1s;
  }
  .skill-tag:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Star button */
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--text-faint);
    transition: color 0.1s, transform 0.1s;
    border-radius: 6px;
    align-self: start;
    justify-self: end;
    line-height: 0;
  }
  .star-btn .ic { width: 18px; height: 18px; }
  .star-btn:hover { color: var(--star); transform: scale(1.15); }
  .star-btn.on { color: var(--star); }

// Avatar color palette（穩定 hash → 同公司總是同色）

  "#ef4444","#f97316","#f59e0b","#eab308","#84cc16","#22c55e",

function avatarColor(name) {
  if (!name) return "#a1a1aa";
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
}
function avatarInitial(name) {
  if (!name) return "?";
  const alpha = name.match(/[A-Za-z]/);
  if (alpha) return alpha[0].toUpperCase();
  return name[0];
}

// ─────────────────────────────────────────────────────
const LS_STARRED = "internradar:starred:v1";
const LS_SAVED   = "internradar:saved:v1";
function loadStarred() {
  try { const r = localStorage.getItem(LS_STARRED); starred = new Set(r ? JSON.parse(r) : []); }
  catch { starred = new Set(); }
}
function persistStarred() {
  try { localStorage.setItem(LS_STARRED, JSON.stringify([...starred])); } catch {}
}
function loadSaved() {
  try { savedSearches = JSON.parse(localStorage.getItem(LS_SAVED) || "[]"); }
  catch { savedSearches = []; }
}
function persistSaved() {
  try { localStorage.setItem(LS_SAVED, JSON.stringify(savedSearches)); } catch {}
}
function toggleStar(url) {
  if (!url) return;
  if (starred.has(url)) starred.delete(url); else starred.add(url);
  persistStarred();
  renderStats();
  renderCatBar();
  renderList();
}

// ─────────────────────────────────────────────────────
// URL 同步
// ─────────────────────────────────────────────────────
function $id(id) { return document.getElementById(id); }
function readUrl() {
  const p = new URLSearchParams(location.search);
  currentCat = p.get("cat") || "all";
  currentCompany = p.get("company") || null;
  $id("q").value            = p.get("q") || "";
  $id("loc").value          = p.get("loc") || "all";
  $id("plat").value         = p.get("plat") || "all";
  $id("salary-type").value  = p.get("stype") || "";
  $id("min-salary").value   = p.get("min") || "0";
  $id("deadline-filter").value = p.get("dl") || "";
  const s = p.get("sort") || "category";
  const sortEl = $id("sort");
  if ([...sortEl.options].some(o => o.value === s)) sortEl.value = s;
}
function writeUrl() {
  const p = new URLSearchParams();
  const q = $id("q").value.trim();
  if (currentCompany)                    p.set("company", currentCompany);
  if (currentCat !== "all")              p.set("cat", currentCat);
  if ($id("loc").value !== "all")        p.set("loc", $id("loc").value);
  if ($id("plat").value !== "all")       p.set("plat", $id("plat").value);
  if ($id("salary-type").value)          p.set("stype", $id("salary-type").value);
  if ($id("min-salary").value !== "0")   p.set("min", $id("min-salary").value);
  if ($id("sort").value !== "category")  p.set("sort", $id("sort").value);
  if ($id("deadline-filter").value)      p.set("dl", $id("deadline-filter").value);
  if (q)                                 p.set("q", q);
  const qs = p.toString();
  history.replaceState(null, "", location.pathname + (qs ? "?" + qs : ""));
}

    populateSelects();

  } catch (e) {
    $id("jobs").innerHTML = `
      <div class="error">
        <strong>無法載入資料：</strong> <code>${esc(e.message)}</code><br>
        如果這是剛部署的版本，GitHub Action 可能還沒跑完，稍等幾分鐘或到 Actions 手動觸發 <code>Update Internship Data</code>。
      </div>`;
    $id("hero-stats").innerHTML = "";
  }
}

function populateSelects() {
  const jobs = data.jobs || [];
  // 地區 select（依實際資料）
  const locCounts = {};
  for (const j of jobs) {
    const k = locationBucket(j.location);
    locCounts[k] = (locCounts[k] || 0) + 1;
  }
  const locOrder = LOCATION_BUCKETS.map(b => b.key).concat(["unknown"]);
  const locEl = $id("loc");
  locEl.innerHTML = `<option value="all">全部地區</option>` +
    locOrder.filter(k => locCounts[k]).map(k =>
      `<option value="${k}">${esc(LOCATION_LABELS[k] || k)} (${locCounts[k]})</option>`
    ).join("");
  // 平台 select
  const platCounts = {};
  for (const p of PLATFORMS) platCounts[p] = 0;
  for (const j of jobs) if (platCounts[j.platform] !== undefined) platCounts[j.platform]++;
  $id("plat").innerHTML = `<option value="all">全部平台</option>` +
    PLATFORMS.filter(p => platCounts[p]).map(p =>
      `<option value="${p}">${esc(p)} (${platCounts[p]})</option>`
    ).join("");
}

function renderStats() {
  const jobs = data.jobs || [];
  const cats = data.categories || [];
  const newCount = jobs.filter(j => j.first_seen === TODAY).length;

                          .sort((a,b) => b.count - a.count)[0];

    <span><strong>${jobs.length}</strong>筆職缺</span>
    ${newCount ? `<span><strong>${newCount}</strong>今日新增</span>` : ""}
    ${topCat ? `<button class="hero-cat" data-cat="${esc(topCat.key)}" title="點擊切到 ${esc(topCat.label)} 分類" style="color:${topCat.color}"><strong>${topCat.count}</strong>${catIc(topCat.key, "ic-sm")} ${esc(topCat.label)}</button>` : ""}

// ─────────────────────────────────────────────────────
// Render: 分類 chips
// ─────────────────────────────────────────────────────
function catMeta(key) {
  return (data.categories || []).find(c => c.key === key) ||
         { key, label: key, emoji: "📋", color: "#94a3b8", count: 0 };
}
function renderCatBar() {
  const jobs = data.jobs || [];
  // Context-aware counts：套用除了「分類」以外的所有當前篩選，再統計每個分類剩幾筆。
  // 這樣選了「台北」後，切換到「產品」前就能看到 "產品 0"，知道交集是空的。
  const baseFilters = { ...currentFilters(), cat: "all" };
  const eligible = jobs.filter(j => matchFilters(j, baseFilters));
  const catCounts = {};
  for (const j of eligible) {
    catCounts[j.category] = (catCounts[j.category] || 0) + 1;
  }
  const starredCount = eligible.filter(j => starred.has(j.url)).length;

  const chips = [
    `<button class="chip ${currentCat === "all" ? "active" : ""}" data-cat="all">全部 <span class="count">${eligible.length}</span></button>`,
    (starred.size > 0
      ? `<button class="chip ${currentCat === "starred" ? "active" : ""} ${starredCount === 0 ? 'empty' : ''}" data-cat="starred" style="color:var(--star)">${ic("starF", "ic-sm")} 收藏 <span class="count">${starredCount}</span></button>`
      : ""),
  ];
  for (const c of (data.categories || [])) {
    if (!c.count) continue;  // 全站完全 0 筆就不顯示 chip
    const contextCount = catCounts[c.key] || 0;
    const active = currentCat === c.key;
    const emptyCls = contextCount === 0 && !active ? " empty" : "";
    chips.push(`
      <button class="chip ${active ? "active" : ""}${emptyCls}" data-cat="${esc(c.key)}">
        <span class="ic-slot" style="color:${c.color}">${catIc(c.key, "ic-sm")}</span>
        ${esc(c.label)}
        <span class="count">${contextCount}</span>
      </button>`);
  }
  const bar = $id("cat-bar");
  bar.innerHTML = chips.filter(Boolean).join("");
  bar.querySelectorAll(".chip").forEach(btn => {
    btn.onclick = () => { currentCat = btn.dataset.cat; writeUrl(); render(); };
  });
}

// ─────────────────────────────────────────────────────
// Render: saved searches
// ─────────────────────────────────────────────────────
function currentFilters() {
  return {
    cat: currentCat,
    loc: $id("loc").value,
    plat: $id("plat").value,
    q: $id("q").value.trim(),
    stype: $id("salary-type").value,
    min: $id("min-salary").value,
    sort: $id("sort").value,
    dl: $id("deadline-filter").value,
  };
}
function deadlineMatch(j, mode) {
  if (!mode) return true;  // 不限
  const dl = j.deadline;
  if (mode === "none") return !dl;
  if (!dl) return false;  // 以下模式都需要有 deadline
  const today = new Date(TODAY);
  const d = new Date(dl);
  const diffDays = Math.round((d - today) / 86400000);
  if (mode === "expired") return diffDays < 0;
  if (mode === "has") return diffDays >= 0;      // 有設 + 未過期
  const n = parseInt(mode);
  if (!isNaN(n)) return diffDays >= 0 && diffDays <= n;
  return true;
}
function matchFilters(j, f) {
  if (f.company && j.company !== f.company) return false;
  if (f.cat === "starred") { if (!starred.has(j.url)) return false; }
  else if (f.cat && f.cat !== "all" && j.category !== f.cat) return false;
  if (f.loc  && f.loc  !== "all" && locationBucket(j.location) !== f.loc) return false;
  if (f.plat && f.plat !== "all" && j.platform !== f.plat) return false;
  if (f.stype && j.salary_type !== f.stype) return false;
  const minS = parseInt(f.min) || 0;
  if (minS > 0 && (!j.salary_min || j.salary_min < minS)) return false;
  if (!deadlineMatch(j, f.dl)) return false;
  if (f.q) {
    const hay = `${j.title} ${j.company} ${j.location}`.toLowerCase();
    if (!hay.includes(f.q.toLowerCase())) return false;
  }
  return true;
}
function summariseFilters(f) {
  const parts = [];
  if (f.cat === "starred") parts.push("收藏");
  else if (f.cat && f.cat !== "all") parts.push(catMeta(f.cat).label);
  if (f.loc  !== "all") parts.push((LOCATION_LABELS[f.loc] || f.loc).replace(/^[^\s]+\s/, ""));
  if (f.plat !== "all") parts.push(f.plat);
  if (f.q) parts.push(`"${f.q}"`);
  const m = parseInt(f.min) || 0; if (m > 0) parts.push(`${(m/1000)|0}k+`);
  if (f.stype) parts.push({monthly:"月薪",hourly:"時薪",negotiable:"面議"}[f.stype] || f.stype);
  if (f.dl) {
    const lbl = {"7":"7天內截止","30":"30天內截止","has":"有截止日","none":"無截止日","expired":"已截止"};
    parts.push(lbl[f.dl] || f.dl);
  }
  return parts.join(" · ") || "全部";
}
function renderSaved() {
  const wrap = $id("saved-wrap");
  if (savedSearches.length === 0) { wrap.innerHTML = ""; return; }
  const parts = [`<span class="saved-label">${ic("bookmark", "ic-sm")} 訂閱</span>`];
  for (const s of savedSearches) {
    const since = s.lastChecked || "0000-01-01";
    const newN = (data.jobs || []).filter(j => (j.first_seen || "") > since && matchFilters(j, s.filters)).length;
    const badge = newN > 0 ? `<span class="badge">+${newN}</span>` : "";
    parts.push(`
      <button class="saved-btn" data-id="${esc(s.id)}" title="套用此訂閱">
        ${esc(s.name)} ${badge}
        <span class="x-btn" data-remove="${esc(s.id)}" title="刪除">${ic("x", "ic-sm")}</span>
      </button>`);
  }
  parts.push(`<button class="saved-add" id="saved-add">+ 訂閱目前篩選</button>`);
  wrap.innerHTML = parts.join("");
  wrap.querySelectorAll(".saved-btn").forEach(btn => {
    btn.onclick = (e) => {
      const removeTarget = e.target.closest("[data-remove]");
      if (removeTarget) {
        e.stopPropagation();
        savedSearches = savedSearches.filter(x => x.id !== removeTarget.dataset.remove);
        persistSaved(); renderSaved();
        return;
      }
      const s = savedSearches.find(x => x.id === btn.dataset.id);
      if (!s) return;
      // apply
      const f = s.filters;
      currentCat = f.cat || "all";
      $id("loc").value          = f.loc || "all";
      $id("plat").value         = f.plat || "all";
      $id("q").value            = f.q || "";
      $id("salary-type").value  = f.stype || "";
      $id("min-salary").value   = f.min || "0";
      $id("deadline-filter").value = f.dl || "";
      if ([...$id("sort").options].some(o => o.value === (f.sort || "category"))) {
        $id("sort").value = f.sort || "category";
      }
      s.lastChecked = new Date().toISOString();
      persistSaved();
      writeUrl();
      render();
    };
  });
  $id("saved-add").onclick = () => {
    const f = currentFilters();
    const any = f.cat !== "all" || f.loc !== "all" || f.plat !== "all" ||
                f.q || f.stype || (parseInt(f.min) || 0) > 0;
    if (!any) { alert("先設定一些篩選條件，再來訂閱"); return; }
    const name = prompt("幫這個訂閱取個名字", summariseFilters(f));
    if (!name) return;
    savedSearches.push({
      id: String(Date.now()),
      name,
      filters: f,
      lastChecked: new Date().toISOString(),
    });
    persistSaved(); renderSaved();
  };
}

function deadlineBadge(deadline) {
  if (!deadline) return "";
  const d = new Date(deadline);
  const diff = Math.round((d - new Date(TODAY)) / 86400000);
  let cls = "badge badge-deadline", label;
  if (diff < 0) { cls += " expired"; label = `已截止 ${deadline.slice(5)}`; }
  else if (diff === 0) { cls += " urgent"; label = "今天截止"; }
  else if (diff <= 7) { cls += " urgent"; label = `${diff} 天後截止`; }
  else { label = `${deadline.slice(5)} 截止`; }
  return `<span class="${cls}">${ic("alarm", "ic-sm")} ${esc(label)}</span>`;
}

// 年級列表 → 人類友善字串
const GRADES_ORDERED = ["大一", "大二", "大三", "大四", "大五"];
function formatEligibility(grades) {
  if (!grades || grades.length === 0) return "";
  if (grades.length === 1 && grades[0] === "不限") return "不限年級";
  const ug = grades.filter(g => GRADES_ORDERED.includes(g));
  const other = grades.filter(g => !GRADES_ORDERED.includes(g));
  const parts = [];
  if (ug.length) {
    const idxs = ug.map(g => GRADES_ORDERED.indexOf(g));
    // 包含研究所 + 本科起點 < 大五 → 簡化為「大X 以上」
    if (grades.includes("研究所") && Math.min(...idxs) < 4) {
      parts.push(`${GRADES_ORDERED[Math.min(...idxs)]}以上`);
    } else if (ug.length > 1) {
      parts.push(ug.join("/"));
    } else {
      parts.push(ug[0]);
    }
  }
  for (const g of other) parts.push(g);
  return parts.join("、");
}
function eligibilityBadge(grades) {
  const label = formatEligibility(grades);
  return label ? `<span class="badge badge-elig">${ic("cap", "ic-sm")} ${esc(label)}</span>` : "";
}

function renderList() {
  const q = $id("q").value.toLowerCase().trim();
  const stype = $id("salary-type").value;
  const minSal = parseInt($id("min-salary").value) || 0;
  const sortBy = $id("sort").value;
  const loc = $id("loc").value;
  const plat = $id("plat").value;
  const dl = $id("deadline-filter").value;
  const cats = data.categories || [];
  const catOrder = Object.fromEntries(cats.map((c, i) => [c.key, i]));

  let list = (data.jobs || []).filter(j =>
    matchFilters(j, { company: currentCompany, cat: currentCat, loc, plat, stype, min: minSal || "0", q, dl })
  );

  list.sort((a, b) => {
    if (sortBy === "category") {
      const c = (catOrder[a.category] ?? 99) - (catOrder[b.category] ?? 99);
      if (c !== 0) return c;
      const fs = (b.first_seen || "").localeCompare(a.first_seen || "");
      if (fs !== 0) return fs;
      return (b.salary_min || 0) - (a.salary_min || 0);
    }
    const dash = sortBy.lastIndexOf("-");
    const field = dash > 0 ? sortBy.slice(0, dash) : sortBy;
    const dir = sortBy.slice(dash + 1) === "asc" ? 1 : -1;
    if (field === "salary")     return ((a.salary_min || 0) - (b.salary_min || 0)) * dir;
    if (field === "company")    return (a.company || "").localeCompare(b.company || "") * dir;
    if (field === "date")       return (a.posted_at || "").localeCompare(b.posted_at || "") * dir;
    if (field === "first_seen") return (a.first_seen || "").localeCompare(b.first_seen || "") * dir;
    if (field === "deadline") {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline) * dir;
    }
    return 0;
  });

  const total = (data.jobs || []).length;
  let info = "";
  if (list.length > 0) {
    if (currentCompany) {
      info = `該公司 ${list.length} 筆`;
    } else {
      info = `顯示 ${list.length} 筆` + (list.length !== total ? `（全站 ${total} 筆）` : "");
    }
  }
  $id("result-info").textContent = info;

  const cont = $id("jobs");
  if (list.length === 0) {
    // 列出所有目前套用中的條件 + 每個旁邊一個 × 可直接拆
    const chips = [];
    if (currentCat === "starred") {
      chips.push({ label: "只看收藏", action: "cat-reset" });
    } else if (currentCat !== "all") {
      const cm = catMeta(currentCat);
      chips.push({ label: cm.label, action: "cat-reset" });
    }
    if (loc !== "all") chips.push({ label: LOCATION_LABELS[loc] || loc, action: "loc-reset" });
    if (plat !== "all") chips.push({ label: plat, action: "plat-reset" });
    if (q) chips.push({ label: `"${q}"`, action: "q-reset" });
    if (stype) chips.push({ label: {monthly:"月薪",hourly:"時薪",negotiable:"面議"}[stype] || stype, action: "stype-reset" });
    if (minSal > 0) chips.push({ label: `月薪 ${(minSal/1000)|0}k+`, action: "min-reset" });
    const dlVal = $id("deadline-filter").value;
    if (dlVal) {
      const dlLabels = { "7":"7 天內截止", "30":"30 天內截止", "has":"有設截止日", "none":"無設截止日", "expired":"已截止" };
      chips.push({ label: dlLabels[dlVal] || dlVal, action: "dl-reset" });
    }

    const hint = currentCat === "starred" && starred.size === 0
      ? "還沒收藏任何職缺。點卡片右邊的星星就會出現在這裡。"
      : chips.length > 0
        ? "以下條件同時套用中，點 × 可以拆掉其中之一："
        : "試著放寬搜尋條件。";
    const chipsHtml = chips.map(c =>
      `<button class="clear-chip" data-action="${esc(c.action)}">${esc(c.label)} ${ic("x", "ic-sm")}</button>`
    ).join("");
    const clearAll = chips.length > 1
      ? `<button class="clear-all" data-action="clear-all">清除全部條件</button>`
      : "";

    cont.innerHTML = `
      <div class="empty">
        <svg class="empty-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <h3>沒有符合條件的實習</h3>
        <p>${esc(hint)}</p>
        ${chipsHtml ? `<div class="clear-row">${chipsHtml} ${clearAll}</div>` : ""}
      </div>`;

    cont.querySelectorAll(".clear-chip, .clear-all").forEach(btn => {
      btn.onclick = () => {
        const act = btn.dataset.action;
        if (act === "cat-reset")   currentCat = "all";
        if (act === "loc-reset")   $id("loc").value = "all";
        if (act === "plat-reset")  $id("plat").value = "all";
        if (act === "q-reset")     $id("q").value = "";
        if (act === "stype-reset") $id("salary-type").value = "";
        if (act === "min-reset")   $id("min-salary").value = "0";
        if (act === "dl-reset")    $id("deadline-filter").value = "";
        if (act === "clear-all") {
          currentCat = "all";
          $id("loc").value = "all";
          $id("plat").value = "all";
          $id("q").value = "";
          $id("salary-type").value = "";
          $id("min-salary").value = "0";
          $id("deadline-filter").value = "";
        }
        writeUrl();
        render();
      };
    });
    return;
  }

  cont.innerHTML = list.map(j => {
    const cm = catMeta(j.category || "other");
    const isNew = j.first_seen === TODAY;
    const isStarred = starred.has(j.url);
    const fsAgo = j.first_seen ? daysAgo(j.first_seen) : "";
    const ac = avatarColor(j.company || j.title || "?");
    return `
      <article class="job" style="border-left-color:${cm.color}">
        <div class="job-avatar" style="background:${ac}" aria-hidden="true">${esc(avatarInitial(j.company))}</div>
        <div class="job-body">
          <div class="job-head">
            <h3 class="job-title">
              <a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a>
              ${isNew ? `<span class="badge badge-new">${ic("sparkle", "ic-sm")} NEW</span>` : ""}
              ${deadlineBadge(j.deadline)}
              ${eligibilityBadge(j.eligibility)}
            </h3>
            <div class="job-salary ${j.salary_type === "negotiable" ? "neg" : ""}">${esc(j.salary || "—")}</div>
          </div>
          <div class="job-meta">
            <span style="color:${cm.color}">${catIc(cm.key, "ic-sm")} ${esc(cm.label)}</span>
            <span class="meta-sep"></span>
            <a class="company-link" data-company="${esc(j.company || "")}">${esc(j.company || "—")}</a>
            ${j.location ? `<span class="meta-sep"></span><span>${ic("pin", "ic-sm")} ${esc(j.location)}</span>` : ""}
            ${fsAgo ? `<span class="meta-sep"></span><span>${ic("sparkle", "ic-sm")} ${esc(fsAgo)}</span>` : ""}
            <span class="meta-sep"></span>
            <span class="meta-platform">${esc(j.platform)}</span>
          </div>
          ${(j.skills && j.skills.length) ? `
          <div class="job-skills">
            ${j.skills.slice(0, 8).map(s =>
              `<button class="skill-tag" data-skill="${esc(s)}">${esc(s)}</button>`
            ).join("")}
          </div>` : ""}
        </div>
        <button class="star-btn ${isStarred ? 'on' : ''}" data-url="${esc(j.url)}"
                aria-label="${isStarred ? '取消收藏' : '收藏'}" title="${isStarred ? '取消收藏' : '收藏'}">
          ${ic(isStarred ? "starF" : "starO")}
        </button>
      </article>`;
  }).join("");

  // interactions
  cont.querySelectorAll(".star-btn").forEach(b =>
    b.onclick = (e) => { e.stopPropagation(); toggleStar(b.dataset.url); });
  cont.querySelectorAll(".company-link").forEach(a =>
    a.onclick = (e) => {
      e.preventDefault();
      const name = a.dataset.company || "";
      if (!name) return;
      currentCompany = name;
      currentCat = "all";
      writeUrl();
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    });
  cont.querySelectorAll(".skill-tag").forEach(b =>
    b.onclick = (e) => { e.stopPropagation(); $id("q").value = b.dataset.skill || ""; writeUrl(); render(); });
}

function daysAgo(iso) {
  if (!iso) return "";
  const d = Math.round((new Date(TODAY) - new Date(iso)) / 86400000);
  if (d <= 0) return "今天發現";
  if (d === 1) return "昨天發現";
  if (d <= 7) return `${d} 天前發現`;
  if (d <= 30) return `${Math.round(d/7)} 週前發現`;
  return `${Math.round(d/30)} 個月前發現`;
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, ch =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[ch]);
}

function render() {
  renderCompany();
  renderStats();
  renderCatBar();
  renderSaved();
  renderList();
}

function renderCompany() {
  const section = $id("company-header");
  const heroSection = document.querySelector("header.hero");
  if (!currentCompany) {
    section.hidden = true;
    if (heroSection) heroSection.style.display = "";
    document.title = "實習雷達 · Internship Radar";
    return;
  }

  const companyJobs = (data.jobs || []).filter(j => j.company === currentCompany);
  section.hidden = false;
  // 公司頁把 hero 藏起來，避免重複的標題區塊
  if (heroSection) heroSection.style.display = "none";
  // SEO / 分享預覽
  document.title = `${currentCompany} · 實習雷達`;
  const desc = document.querySelector('meta[name="description"]');
  if (desc) {
    desc.setAttribute("content", `${currentCompany} 目前在 104 / CakeResume / Yourator 上有 ${companyJobs.length} 個實習職缺。`);
  }

  // Avatar
  const ac = avatarColor(currentCompany);
  const avatarEl = $id("company-avatar");
  avatarEl.style.background = ac;
  avatarEl.textContent = avatarInitial(currentCompany);

  // Name + sub
  $id("company-name").textContent = currentCompany;
  if (companyJobs.length === 0) {
    $id("company-sub").textContent = "這家公司目前沒有 open 實習（可能已截止或尚未被爬到）";
    $id("company-stats").innerHTML = "";
    $id("company-cats").innerHTML = "";
    return;
  }
  const firstSeens = companyJobs.map(j => j.first_seen).filter(Boolean).sort();
  const earliest = firstSeens[0];
  const platforms = [...new Set(companyJobs.map(j => j.platform))];
  const subParts = [`${companyJobs.length} 個 open 實習`];
  if (earliest) subParts.push(`自 ${earliest} 起被雷達追蹤`);
  if (platforms.length) subParts.push(platforms.join(" · "));
  $id("company-sub").textContent = subParts.join(" · ");

  // Stats
  const salaried = companyJobs.filter(j => j.salary_min);
  const avgSalary = salaried.length
    ? Math.round(salaried.reduce((s, j) => s + j.salary_min, 0) / salaried.length)
    : null;
  const newTodayN = companyJobs.filter(j => j.first_seen === TODAY).length;
  const withDeadlineN = companyJobs.filter(j => j.deadline).length;
  const stats = [
    { label: "Open 實習", value: String(companyJobs.length) },
    { label: "平均月薪", value: avgSalary ? `NT$ ${Math.round(avgSalary/1000)}k` : "—", dim: !avgSalary },
    { label: "今日新增", value: String(newTodayN) },
    { label: "有截止日", value: String(withDeadlineN) },
  ];
  $id("company-stats").innerHTML = stats.map(s =>
    `<div class="company-stat"><div class="label">${esc(s.label)}</div><div class="value ${s.dim ? 'dim' : ''}">${esc(s.value)}</div></div>`
  ).join("");

  // Category distribution
  const catCounts = {};
  for (const j of companyJobs) catCounts[j.category] = (catCounts[j.category] || 0) + 1;
  const catEntries = Object.entries(catCounts).sort((a, b) => b[1] - a[1]);
  const total = companyJobs.length;
  const barSegs = catEntries.map(([k, n]) => {
    const meta = catMeta(k);
    return `<div class="bar-seg" style="width:${(n/total*100).toFixed(1)}%;background:${meta.color}" title="${esc(meta.label)} ${n}"></div>`;
  }).join("");
  const legend = catEntries.map(([k, n]) => {
    const meta = catMeta(k);
    return `<span><span class="dot" style="background:${meta.color}"></span>${esc(meta.label)}<strong>${n}</strong></span>`;
  }).join("");
  $id("company-cats").innerHTML = `
    <h4>分類分佈</h4>
    <div class="bar">${barSegs}</div>
    <div class="legend">${legend}</div>
  `;
}

// ─────────────────────────────────────────────────────
// Event wiring
// ─────────────────────────────────────────────────────
["q", "sort", "loc", "plat", "salary-type", "min-salary", "deadline-filter"].forEach(id => {
  $id(id).addEventListener("input", () => { writeUrl(); render(); });
});

document.addEventListener("keydown", (e) => {
  if (e.target.matches("input, select, textarea")) {
    if (e.key === "Escape" && e.target.id === "q") {
      $id("q").value = ""; writeUrl(); render();
    }
    return;
  }
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "/") { e.preventDefault(); $id("q").focus(); return; }
  if (/^[1-9]$/.test(e.key)) {
    const cats = (data.categories || []).filter(c => c.count > 0);
    const idx = parseInt(e.key) - 1;
    if (cats[idx]) { currentCat = cats[idx].key; writeUrl(); render(); }
    return;
  }
  if (e.key === "0") { currentCat = "all"; writeUrl(); render(); return; }
  if ((e.key === "s" || e.key === "S") && starred.size > 0) {
    currentCat = "starred"; writeUrl(); render(); return;
  }
});

// Back button 的 click 處理（公司聚合頁）
document.getElementById("company-back").onclick = (e) => {
  e.preventDefault();
  currentCompany = null;
  writeUrl();
  window.scrollTo({ top: 0, behavior: "smooth" });
  render();
};

// ─────────────────────────────────────────────────────
// 啟動
// ─────────────────────────────────────────────────────
loadStarred();
loadSaved();
load();
</script>
</body>
</html>
