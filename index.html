<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>實習雷達 · Internship Radar</title>
<meta name="description" content="每天自動彙整 104、CakeResume、Yourator 的最新實習職缺，分類呈現。">
<meta property="og:title" content="實習雷達 · Internship Radar">
<meta property="og:description" content="每天自動彙整 104、CakeResume、Yourator 的最新實習職缺。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎯%3C/text%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f8;
    --bg-gradient: linear-gradient(180deg, #eef2ff 0%, #f7f7f8 260px);
    --panel: #ffffff;
    --panel-2: #fafafa;
    --border: #e5e7eb;
    --border-strong: #d4d4d8;
    --text: #111827;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --tech: #2563eb;
    --tech-soft: #dbeafe;
    --finance: #d97706;
    --finance-soft: #fef3c7;
    --other: #6b7280;
    --other-soft: #f3f4f6;
    --new: #10b981;
    --new-soft: #d1fae5;
    --shadow-sm: 0 1px 2px rgba(17,24,39,0.04), 0 0 0 1px rgba(17,24,39,0.05);
    --shadow-md: 0 4px 14px rgba(17,24,39,0.06), 0 0 0 1px rgba(17,24,39,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #09090b;
      --bg-gradient: linear-gradient(180deg, #1e1b4b 0%, #09090b 320px);
      --panel: #18181b;
      --panel-2: #101013;
      --border: #27272a;
      --border-strong: #3f3f46;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --text-faint: #71717a;
      --accent: #818cf8;
      --accent-soft: #1e1b4b;
      --tech: #60a5fa;
      --tech-soft: #1e3a8a;
      --finance: #fbbf24;
      --finance-soft: #78350f;
      --other: #a1a1aa;
      --other-soft: #27272a;
      --new: #34d399;
      --new-soft: #064e3b;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    background-image: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container { max-width: 1160px; margin: 0 auto; padding: 0 20px; }
  @media (max-width: 480px) { .container { padding: 0 16px; } }

  /* ---------- Hero ---------- */
  header.hero {
    padding: 40px 0 24px;
  }
  @media (max-width: 720px) {
    header.hero { padding: 24px 0 16px; }
  }
  .hero-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  @media (max-width: 720px) {
    h1 { font-size: 24px; gap: 8px; }
    h1 .dot { width: 8px; height: 8px; box-shadow: 0 0 0 3px var(--new-soft); }
  }
  h1 .dot {
    width: 10px; height: 10px; border-radius: 999px;
    background: var(--new);
    box-shadow: 0 0 0 4px var(--new-soft);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 15px;
    margin: 6px 0 0;
    max-width: 640px;
  }
  @media (max-width: 720px) {
    .subtitle { font-size: 13.5px; line-height: 1.5; }
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 24px;
  }
  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 16px; }
  }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }
  @media (max-width: 720px) { .stat-card { padding: 10px 12px; border-radius: 10px; } }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (max-width: 720px) { .stat-card .label { font-size: 11px; } }
  .stat-card .value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  @media (max-width: 720px) { .stat-card .value { font-size: 20px; } }
  .stat-card .delta {
    font-size: 12px;
    color: var(--new);
    margin-top: 2px;
    font-weight: 500;
  }

  .meta-row {
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .meta-row span strong { color: var(--text); font-weight: 600; }
  @media (max-width: 720px) {
    .meta-row { font-size: 12px; gap: 8px; margin-top: 10px; }
    /* 手機版只顯示「更新時間」那一行，自動排程說明省略 */
    .meta-row span:nth-child(n+2) { display: none; }
  }

  /* ---------- Controls ---------- */
  .controls-wrap {
    position: sticky;
    top: 0;
    z-index: 10;
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    margin: 8px 0 16px;
  }
  @media (max-width: 720px) {
    .controls-wrap { padding: 10px 0; margin: 4px 0 12px; }
  }
  .controls {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 10px;
  }
  /* 平板：search 占滿一行，其他 3 選單 1 行 */
  @media (max-width: 720px) {
    .controls {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .search-wrap { grid-column: 1 / -1; }
  }
  /* 最小螢幕：3 個選單放不下時自動降到 1 個一列 */
  @media (max-width: 380px) {
    .controls { grid-template-columns: 1fr; }
  }
  .search-wrap { position: relative; }
  .search-wrap::before {
    content: "🔍";
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.6;
    pointer-events: none;
  }
  .search-wrap kbd {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    padding: 2px 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-faint);
    font-family: inherit;
  }
  /* 手機觸控裝置用不到鍵盤快捷鍵 */
  @media (hover: none), (max-width: 720px) {
    .search-wrap kbd { display: none; }
  }
  .controls input, .controls select {
    padding: 11px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    color: var(--text);
    font-family: inherit;
    width: 100%;
    transition: border-color 0.1s, box-shadow 0.1s;
    min-height: 42px;
  }
  /* iOS 在 font-size < 16px 時會自動放大頁面 → 手機版強制 16px */
  @media (max-width: 720px) {
    .controls input, .controls select { font-size: 16px; padding: 10px 12px; }
  }
  .controls .search-wrap input { padding-left: 36px; padding-right: 48px; }
  @media (max-width: 720px) {
    .controls .search-wrap input { padding-right: 14px; }
  }
  .controls input:focus, .controls select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* ---------- Tabs ---------- */
  .tabs-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tabs-row .tabs-label {
    font-size: 12px;
    color: var(--text-faint);
    font-weight: 500;
    margin-right: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .tab {
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    transition: all 0.1s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 36px;
  }
  .tab:hover { color: var(--text); border-color: var(--border-strong); }
  .tab.active {
    background: var(--text);
    color: var(--panel);
    border-color: var(--text);
  }
  .tab .count {
    font-size: 11px;
    opacity: 0.75;
    font-weight: 500;
  }
  .tab.active .count { opacity: 0.85; }
  .tab .cat-dot {
    width: 7px; height: 7px;
    border-radius: 999px;
    background: var(--other);
  }

  /* 手機版：tabs 改成橫向滑動，不換行；邊緣淡化提示可捲動 */
  @media (max-width: 720px) {
    .tabs-row {
      flex-wrap: nowrap;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-left: -16px;
      margin-right: -16px;
      padding-left: 16px;
      padding-right: 16px;
      mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
    }
    .tabs-row::-webkit-scrollbar { display: none; }
    .tab { scroll-snap-align: start; }
  }

  /* ---------- Jobs ---------- */
  main { padding-bottom: 80px; }
  .result-info {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .jobs { display: grid; gap: 8px; }
  .job {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 4px 16px;
    align-items: start;
    transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s;
    position: relative;
  }
  @media (max-width: 600px) { .job { padding: 12px 14px; border-radius: 10px; gap: 2px 12px; } }
  .job:hover {
    transform: translateY(-1px);
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
  }
  .job .cat-rail {
    width: 4px;
    align-self: stretch;
    border-radius: 2px;
    margin-right: 2px;
    background: var(--other);
  }

  .job-body { min-width: 0; }
  .job-title-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .job-title {
    font-weight: 600;
    font-size: 15px;
    margin: 0;
    line-height: 1.4;
  }
  .job-title a {
    color: var(--text);
    text-decoration: none;
  }
  .job-title a:hover { color: var(--accent); }
  @media (max-width: 600px) {
    .job-title { font-size: 14.5px; }
    .job-title-row { gap: 6px; }
  }
  .new-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 999px;
    background: var(--new-soft);
    color: var(--new);
    letter-spacing: 0.02em;
  }
  .deadline-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 999px;
    background: #fef3c7;
    color: #92400e;
    letter-spacing: 0.02em;
  }
  .deadline-badge.urgent { background: #fee2e2; color: #991b1b; }
  .deadline-badge.expired { background: #f3f4f6; color: #9ca3af; }
  @media (prefers-color-scheme: dark) {
    .deadline-badge { background: #422006; color: #fde68a; }
    .deadline-badge.urgent { background: #450a0a; color: #fca5a5; }
    .deadline-badge.expired { background: #27272a; color: #71717a; }
  }
  .job-company {
    color: var(--text-muted);
    font-size: 13px;
    margin: 2px 0 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-company .company-link {
    color: inherit;
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.1s, color 0.1s;
  }
  .job-company .company-link:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  @media (max-width: 600px) {
    .job-company { font-size: 12.5px; margin: 2px 0 4px; white-space: normal; }
  }

  /* Star button */
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    line-height: 1;
    color: var(--text-faint);
    transition: color 0.1s, transform 0.1s;
    font-family: inherit;
    flex-shrink: 0;
  }
  .star-btn:hover { color: #f59e0b; transform: scale(1.15); }
  .star-btn.active { color: #f59e0b; }
  .star-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .job-meta {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--text-faint);
    flex-wrap: wrap;
    align-items: center;
  }
  @media (max-width: 600px) {
    .job-meta { gap: 6px; font-size: 11.5px; }
  }
  .pill {
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .pill.platform-104         { background: #fee2e2; color: #991b1b; }
  .pill.platform-CakeResume  { background: #ffedd5; color: #9a3412; }
  .pill.platform-Yourator    { background: #ccfbf1; color: #115e59; }
  @media (prefers-color-scheme: dark) {
    .pill.platform-104        { background: #450a0a; color: #fca5a5; }
    .pill.platform-CakeResume { background: #431407; color: #fdba74; }
    .pill.platform-Yourator   { background: #042f2e; color: #5eead4; }
  }
  .pill.cat-badge {
    /* color + background set inline from category metadata */
  }

  .job-right {
    text-align: right;
    white-space: nowrap;
    min-width: 0;
  }
  .job-salary {
    font-size: 14px;
    font-weight: 600;
    color: #059669;
  }
  @media (prefers-color-scheme: dark) {
    .job-salary { color: #34d399; }
  }
  .job-salary.negotiable { color: var(--text-muted); font-weight: 400; }
  .job-date {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  @media (max-width: 600px) {
    .job { grid-template-columns: auto 1fr; }
    .job-right {
      grid-column: 1 / -1;
      text-align: left;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      white-space: normal;
    }
    .job-salary { font-size: 13.5px; }
    .job-date { margin-top: 0; font-size: 11px; }
  }

  /* ---------- Empty / loading / error ---------- */
  .empty, .loading {
    text-align: center;
    padding: 72px 20px;
    color: var(--text-muted);
  }
  .empty h3 { color: var(--text); margin: 0 0 6px; font-size: 17px; }
  .empty p { margin: 0; font-size: 14px; }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 999px;
    margin: 0 auto 12px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: var(--panel);
    border: 1px solid #fecaca;
    border-left: 3px solid #ef4444;
    padding: 16px 18px;
    border-radius: 10px;
    margin: 20px 0;
    font-size: 14px;
  }
  @media (prefers-color-scheme: dark) {
    .error { border-color: #7f1d1d; border-left-color: #ef4444; }
  }
  .error code {
    background: var(--panel-2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12.5px;
  }

  footer {
    padding: 28px 0 40px;
    margin-top: 40px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--text); text-decoration: underline; }
</style>
</head>
<body>

<header class="hero">
  <div class="container">
    <div class="hero-top">
      <div>
        <h1><span class="dot"></span>實習雷達</h1>
        <p class="subtitle">每天自動彙整 104、CakeResume、Yourator 目前開放中的實習，依科技 / 金融管顧 / 其他分類。</p>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat-card"><div class="label">📊 總職缺</div><div class="value" id="s-total">—</div></div>
      <div class="stat-card"><div class="label" id="s-cat1-label">💻 科技</div><div class="value" id="s-cat1">—</div></div>
      <div class="stat-card"><div class="label" id="s-cat2-label">📣 行銷</div><div class="value" id="s-cat2">—</div></div>
      <div class="stat-card"><div class="label">✨ 今日新增</div><div class="value" id="s-new">—</div></div>
    </div>

    <div class="meta-row" id="meta"><span>載入中...</span></div>
  </div>
</header>

<div class="controls-wrap">
  <div class="container">
    <div class="controls">
      <div class="search-wrap">
        <input type="search" id="q" placeholder="搜尋職稱、公司、地點..." autocomplete="off">
        <kbd>/</kbd>
      </div>
      <select id="salary-type">
        <option value="">所有薪資類型</option>
        <option value="monthly">月薪</option>
        <option value="hourly">時薪</option>
        <option value="negotiable">面議</option>
      </select>
      <select id="min-salary">
        <option value="0">任何薪資</option>
        <option value="25000">月薪 25k+</option>
        <option value="30000">月薪 30k+</option>
        <option value="35000">月薪 35k+</option>
        <option value="40000">月薪 40k+</option>
        <option value="50000">月薪 50k+</option>
      </select>
      <select id="sort">
        <optgroup label="推薦">
          <option value="category">🎯 分類優先（預設）</option>
        </optgroup>
        <optgroup label="薪資">
          <option value="salary-desc">💰 薪資 高→低</option>
          <option value="salary-asc">💰 薪資 低→高</option>
        </optgroup>
        <optgroup label="上架日">
          <option value="date-desc">📅 最新上架</option>
          <option value="date-asc">📅 最舊上架</option>
        </optgroup>
        <optgroup label="發現日">
          <option value="first_seen-desc">✨ 最新發現</option>
          <option value="first_seen-asc">✨ 最早發現</option>
        </optgroup>
        <optgroup label="截止日">
          <option value="deadline-asc">⏰ 快要截止</option>
          <option value="deadline-desc">⏰ 最晚截止</option>
        </optgroup>
        <optgroup label="公司">
          <option value="company-asc">🏢 公司 A→Z</option>
          <option value="company-desc">🏢 公司 Z→A</option>
        </optgroup>
      </select>
    </div>
  </div>
</div>

<main>
  <div class="container">
    <div class="tabs-row" id="cat-tabs"></div>
    <div class="tabs-row" id="loc-tabs"></div>
    <div class="tabs-row" id="plat-tabs"></div>
    <div class="result-info" id="result-info"></div>
    <div id="jobs" class="jobs">
      <div class="loading"><div class="spinner"></div>載入實習資料...</div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    資料來源：104 人力銀行 · CakeResume · Yourator
    · 由 <a href="https://github.com/Jean-yzj/internx.internship-radar" target="_blank" rel="noopener">GitHub Actions</a> 每天自動更新
  </div>
</footer>

<script>
const PLATFORMS = ["104", "CakeResume", "Yourator"];
const TODAY = new Date().toISOString().slice(0, 10);

// 地區分桶（依 j.location 字串）
const LOCATION_BUCKETS = [
  { key: "remote",      label: "💻 遠端",    re: /remote|遠端|在家|work from home|wfh|anywhere/i },
  { key: "taipei",      label: "🏙 台北",    re: /台北(?!縣)|taipei/i },
  { key: "new-taipei",  label: "🏙 新北",    re: /新北|new taipei/i },
  { key: "taoyuan",     label: "📍 桃園",    re: /桃園|taoyuan/i },
  { key: "hsinchu",     label: "🔬 新竹",    re: /新竹|hsinchu/i },
  { key: "taichung",    label: "📍 台中",    re: /台中|taichung/i },
  { key: "tainan",      label: "📍 台南",    re: /台南|tainan/i },
  { key: "kaohsiung",   label: "📍 高雄",    re: /高雄|kaohsiung/i },
  { key: "overseas",    label: "🌏 海外",    re: /海外|overseas|美國|usa|日本|japan|singapore|新加坡|malaysia|馬來|indonesia|印尼|thailand|泰|hong kong|香港|vietnam|越南|越|philippines|菲律賓/i },
  { key: "other-tw",    label: "📌 其他",    re: /花蓮|hualien|基隆|keelung|宜蘭|yilan|苗栗|miaoli|彰化|changhua|雲林|yunlin|嘉義|chiayi|屏東|pingtung|澎湖|金門|連江|南投|nantou/i },
];
function locationBucket(loc) {
  const s = (loc || "").trim();
  if (!s) return "unknown";
  for (const b of LOCATION_BUCKETS) if (b.re.test(s)) return b.key;
  return "unknown";
}
const LOCATION_LABELS = Object.fromEntries(
  LOCATION_BUCKETS.map(b => [b.key, b.label]).concat([["unknown", "❓ 未標註"]])
);

let data = { jobs: [], generated_at: null, summary: {}, categories: [] };
let currentCat  = "all";
let currentPlat = "all";
let currentLoc  = "all";
let starred     = new Set();

// ---- LocalStorage bookmarks ----
const LS_KEY = "internradar:starred:v1";
function loadStarred() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) starred = new Set(JSON.parse(raw));
  } catch { starred = new Set(); }
}
function saveStarred() {
  try { localStorage.setItem(LS_KEY, JSON.stringify([...starred])); } catch {}
}
function toggleStar(url) {
  if (!url) return;
  if (starred.has(url)) starred.delete(url);
  else starred.add(url);
  saveStarred();
  render();
}

// ---- hex → soft rgba background ----
function hexToSoft(hex, alpha = 0.14) {
  const h = (hex || "#94a3b8").replace("#", "");
  const r = parseInt(h.substring(0,2), 16);
  const g = parseInt(h.substring(2,4), 16);
  const b = parseInt(h.substring(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function catMeta(key) {
  return (data.categories || []).find(c => c.key === key) || {
    key, label: key, emoji: "📋", color: "#94a3b8", count: 0,
  };
}

// ---- URL state sync ----
function readUrlState() {
  const p = new URLSearchParams(location.search);
  currentCat  = p.get("cat")  || "all";
  currentPlat = p.get("plat") || "all";
  currentLoc  = p.get("loc")  || "all";
  const qEl = document.getElementById("q");
  const stypeEl = document.getElementById("salary-type");
  const minEl = document.getElementById("min-salary");
  const sortEl = document.getElementById("sort");
  qEl.value = p.get("q") || "";
  stypeEl.value = p.get("stype") || "";
  minEl.value = p.get("min") || "0";
  const sortVal = p.get("sort") || "category";
  if (Array.from(sortEl.options).some(o => o.value === sortVal)) {
    sortEl.value = sortVal;
  } else {
    sortEl.value = "category";
  }
}
function writeUrlState() {
  const p = new URLSearchParams();
  const q = document.getElementById("q").value.trim();
  const stype = document.getElementById("salary-type").value;
  const minSal = document.getElementById("min-salary").value;
  const sort = document.getElementById("sort").value;
  if (currentCat !== "all")  p.set("cat", currentCat);
  if (currentPlat !== "all") p.set("plat", currentPlat);
  if (currentLoc !== "all")  p.set("loc", currentLoc);
  if (q)                     p.set("q", q);
  if (stype)                 p.set("stype", stype);
  if (minSal && minSal !== "0") p.set("min", minSal);
  if (sort !== "category")   p.set("sort", sort);
  const qs = p.toString();
  history.replaceState(null, "", location.pathname + (qs ? "?" + qs : ""));
}

async function load() {
  try {
    const res = await fetch("./data/internships.json?v=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    data = await res.json();
    render();
  } catch (e) {
    document.getElementById("jobs").innerHTML = `
      <div class="error">
        <strong>無法載入資料：</strong> <code>${escapeHtml(e.message)}</code><br>
        如果這是剛部署的版本，可能是第一次 GitHub Action 還沒跑完，
        稍等幾分鐘或到 Actions 頁手動觸發 <code>Update Internship Data</code>。
      </div>`;
    document.getElementById("meta").innerHTML = "<span>尚無資料</span>";
  }
}

function renderStats() {
  const jobs = data.jobs || [];
  const cats = data.categories || [];
  let newCount = 0;
  for (const j of jobs) if (j.first_seen === TODAY) newCount++;
  document.getElementById("s-total").textContent = jobs.length.toLocaleString();
  document.getElementById("s-new").textContent   = newCount.toLocaleString();
  const top = [...cats].filter(c => c.key !== "other").sort((a,b) => b.count - a.count).slice(0, 2);
  if (top[0]) {
    document.getElementById("s-cat1-label").innerHTML =
      `<span style="color:${top[0].color}">●</span> ${top[0].emoji} ${escapeHtml(top[0].label)}`;
    document.getElementById("s-cat1").textContent = top[0].count.toLocaleString();
  }
  if (top[1]) {
    document.getElementById("s-cat2-label").innerHTML =
      `<span style="color:${top[1].color}">●</span> ${top[1].emoji} ${escapeHtml(top[1].label)}`;
    document.getElementById("s-cat2").textContent = top[1].count.toLocaleString();
  }
}

function renderMeta() {
  const m = document.getElementById("meta");
  if (!data.generated_at) { m.innerHTML = ""; return; }
  const when = new Date(data.generated_at);
  const ago = Math.round((Date.now() - when.getTime()) / 60000);
  const agoText = ago < 1     ? "剛剛"
                : ago < 60    ? `${ago} 分鐘前`
                : ago < 60*24 ? `${Math.round(ago/60)} 小時前`
                :               `${Math.round(ago/60/24)} 天前`;
  m.innerHTML = `
    <span>🕒 資料更新於 <strong>${agoText}</strong>（${when.toLocaleString("zh-TW", {hour12: false})}）</span>
    <span>📡 每天台灣時間 <strong>01:00 / 14:00 / 20:00</strong> 自動更新</span>
  `;
}

function renderTabs() {
  const jobs = data.jobs || [];
  const cats = data.categories || [];

  // 平台計數
  const platCounts = { all: jobs.length };
  for (const p of PLATFORMS) platCounts[p] = 0;
  for (const j of jobs) platCounts[j.platform] = (platCounts[j.platform] || 0) + 1;

  // 地區計數
  const locCounts = {};
  for (const j of jobs) {
    const k = locationBucket(j.location);
    locCounts[k] = (locCounts[k] || 0) + 1;
  }

  // 分類 tabs：全部 + ⭐收藏 + 所有有資料的類別
  const catTabs = [`
    <button class="tab ${currentCat === "all" ? "active" : ""}" data-cat="all">
      🎯 全部 <span class="count">${jobs.length}</span>
    </button>`];
  if (starred.size > 0) {
    catTabs.push(`
      <button class="tab ${currentCat === "starred" ? "active" : ""}" data-cat="starred">
        ⭐ 收藏 <span class="count">${starred.size}</span>
      </button>`);
  } else {
    catTabs.push(`
      <button class="tab" data-cat="starred" style="opacity:0.5" title="收藏任何職缺後，這裡會顯示你的收藏列表">
        ⭐ 收藏 <span class="count">0</span>
      </button>`);
  }
  for (const c of cats) {
    if (c.count === 0) continue;
    const active = currentCat === c.key;
    catTabs.push(`
      <button class="tab ${active ? "active" : ""}" data-cat="${escapeHtml(c.key)}">
        <span class="cat-dot" style="background:${c.color}"></span>
        ${c.emoji} ${escapeHtml(c.label)}
        <span class="count">${c.count}</span>
      </button>`);
  }
  document.getElementById("cat-tabs").innerHTML =
    `<span class="tabs-label">分類</span>` + catTabs.join("");

  // 地區 tabs（按資料動態，0 筆不顯示）
  const locOrder = LOCATION_BUCKETS.map(b => b.key).concat(["unknown"]);
  const locTabs = [`
    <button class="tab ${currentLoc === "all" ? "active" : ""}" data-loc="all">
      全部 <span class="count">${jobs.length}</span>
    </button>`];
  for (const k of locOrder) {
    if (!locCounts[k]) continue;
    const label = LOCATION_LABELS[k] || k;
    locTabs.push(`
      <button class="tab ${currentLoc === k ? "active" : ""}" data-loc="${escapeHtml(k)}">
        ${label} <span class="count">${locCounts[k]}</span>
      </button>`);
  }
  document.getElementById("loc-tabs").innerHTML =
    `<span class="tabs-label">地區</span>` + locTabs.join("");

  // 平台 tabs
  document.getElementById("plat-tabs").innerHTML =
    `<span class="tabs-label">平台</span>` +
    `<button class="tab ${currentPlat === "all" ? "active" : ""}" data-plat="all">全部 <span class="count">${platCounts.all}</span></button>` +
    PLATFORMS.map(p =>
      `<button class="tab ${currentPlat === p ? "active" : ""}" data-plat="${p}">${p} <span class="count">${platCounts[p] || 0}</span></button>`
    ).join("");

  document.querySelectorAll("#cat-tabs .tab").forEach(btn => {
    btn.onclick = () => { currentCat = btn.dataset.cat; writeUrlState(); render(); };
  });
  document.querySelectorAll("#loc-tabs .tab").forEach(btn => {
    btn.onclick = () => { currentLoc = btn.dataset.loc; writeUrlState(); render(); };
  });
  document.querySelectorAll("#plat-tabs .tab").forEach(btn => {
    btn.onclick = () => { currentPlat = btn.dataset.plat; writeUrlState(); render(); };
  });
}

function renderList() {
  const q = document.getElementById("q").value.toLowerCase().trim();
  const stype = document.getElementById("salary-type").value;
  const minSal = parseInt(document.getElementById("min-salary").value) || 0;
  const sortBy = document.getElementById("sort").value;

  const cats = data.categories || [];
  const catOrder = Object.fromEntries(cats.map((c, i) => [c.key, i]));

  let list = (data.jobs || []).filter(j => {
    if (currentCat === "starred") {
      if (!starred.has(j.url)) return false;
    } else if (currentCat !== "all" && j.category !== currentCat) {
      return false;
    }
    if (currentLoc !== "all" && locationBucket(j.location) !== currentLoc) return false;
    if (currentPlat !== "all" && j.platform !== currentPlat) return false;
    if (stype && j.salary_type !== stype) return false;
    if (minSal > 0 && (!j.salary_min || j.salary_min < minSal)) return false;
    if (q) {
      const hay = `${j.title} ${j.company} ${j.location}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    if (sortBy === "category") {
      const c = (catOrder[a.category] ?? 99) - (catOrder[b.category] ?? 99);
      if (c !== 0) return c;
      const fs = (b.first_seen || "").localeCompare(a.first_seen || "");
      if (fs !== 0) return fs;
      return (b.salary_min || 0) - (a.salary_min || 0);
    }
    const dashIdx = sortBy.lastIndexOf("-");
    const field = dashIdx > 0 ? sortBy.slice(0, dashIdx) : sortBy;
    const dir = sortBy.slice(dashIdx + 1) === "asc" ? 1 : -1;
    if (field === "salary") return ((a.salary_min || 0) - (b.salary_min || 0)) * dir;
    if (field === "company") return (a.company || "").localeCompare(b.company || "") * dir;
    if (field === "date") return (a.posted_at || "").localeCompare(b.posted_at || "") * dir;
    if (field === "first_seen") return (a.first_seen || "").localeCompare(b.first_seen || "") * dir;
    if (field === "deadline") {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline) * dir;
    }
    return 0;
  });

  const totalJobs = (data.jobs || []).length;
  document.getElementById("result-info").textContent =
    list.length === 0 ? "" :
    `顯示 ${list.length} 筆` + (list.length !== totalJobs ? `（共 ${totalJobs} 筆）` : "");

  const container = document.getElementById("jobs");
  if (list.length === 0) {
    const hint = currentCat === "starred"
      ? "還沒收藏任何職缺。點職缺右邊的 ☆ 就會收藏到這裡。"
      : "試著放寬搜尋條件，或切換分類 / 地區 / 平台。";
    container.innerHTML = `
      <div class="empty">
        <h3>沒有符合條件的實習</h3>
        <p>${escapeHtml(hint)}</p>
      </div>`;
    return;
  }

  container.innerHTML = list.map(j => {
    const isNew = j.first_seen === TODAY;
    const salaryClass = j.salary_type === "negotiable" ? "negotiable" : "";
    const cm = catMeta(j.category || "other");
    const deadlineBadge = deadlineBadgeHtml(j.deadline);
    const isStarred = starred.has(j.url);
    return `
      <article class="job">
        <div class="cat-rail" style="background:${cm.color}"></div>
        <div class="job-body">
          <div class="job-title-row">
            <h3 class="job-title"><a href="${escapeHtml(j.url)}" target="_blank" rel="noopener">${escapeHtml(j.title)}</a></h3>
            ${isNew ? '<span class="new-badge">✨ NEW</span>' : ""}
            ${deadlineBadge}
          </div>
          <div class="job-company">
            <a class="company-link" data-company="${escapeHtml(j.company || "")}" title="只看這家公司的職缺">${escapeHtml(j.company || "—")}</a>
          </div>
          <div class="job-meta">
            <span class="pill cat-badge" style="background:${hexToSoft(cm.color)};color:${cm.color}">${cm.emoji} ${escapeHtml(cm.label)}</span>
            <span class="pill platform-${escapeHtml(j.platform)}">${escapeHtml(j.platform)}</span>
            ${j.location ? `<span>📍 ${escapeHtml(j.location)}</span>` : ""}
          </div>
        </div>
        <div class="job-right">
          <button class="star-btn ${isStarred ? 'active' : ''}" data-url="${escapeHtml(j.url)}"
                  aria-label="${isStarred ? '取消收藏' : '收藏'}" title="${isStarred ? '取消收藏' : '收藏'}">
            ${isStarred ? '★' : '☆'}
          </button>
          <div class="job-salary ${salaryClass}">${escapeHtml(j.salary || "—")}</div>
          <div class="job-date">${escapeHtml(j.posted_at || "")}</div>
        </div>
      </article>`;
  }).join("");

  // star click
  container.querySelectorAll(".star-btn").forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); toggleStar(btn.dataset.url); };
  });
  // company click → 用公司名搜尋
  container.querySelectorAll(".company-link").forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      const name = a.dataset.company || "";
      if (!name) return;
      document.getElementById("q").value = name;
      writeUrlState();
      render();
    };
  });
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, ch =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}

function deadlineBadgeHtml(deadline) {
  if (!deadline) return "";
  const today = new Date(TODAY);
  const d = new Date(deadline);
  const diffDays = Math.round((d - today) / 86400000);
  let cls = "deadline-badge";
  let label;
  if (diffDays < 0) {
    cls += " expired";
    label = `已截止 ${deadline.slice(5)}`;
  } else if (diffDays === 0) {
    cls += " urgent";
    label = "⏰ 今天截止";
  } else if (diffDays <= 7) {
    cls += " urgent";
    label = `⏰ ${diffDays} 天後截止`;
  } else {
    label = `⏰ ${deadline.slice(5)} 截止`;
  }
  return `<span class="${cls}">${escapeHtml(label)}</span>`;
}

function render() {
  renderStats();
  renderMeta();
  renderTabs();
  renderList();
}

// controls → sync URL + re-render
["q", "salary-type", "min-salary", "sort"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    writeUrlState();
    renderList();
  });
});

// ---- 鍵盤快捷鍵 ----
document.addEventListener("keydown", (e) => {
  // `/` — 搜尋框 focus
  if (e.key === "/" && !e.target.matches("input, select, textarea")) {
    e.preventDefault();
    document.getElementById("q").focus();
    return;
  }
  // Esc — 搜尋框清空
  if (e.key === "Escape" && document.activeElement === document.getElementById("q")) {
    document.getElementById("q").value = "";
    writeUrlState();
    renderList();
    return;
  }
  // 下列快捷鍵在 input / select / textarea 內不觸發
  if (e.target.matches("input, select, textarea")) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  // 1-9 → 切到第 N 個非零分類（按當前 data.categories 順序）
  if (/^[1-9]$/.test(e.key)) {
    const visibleCats = (data.categories || []).filter(c => c.count > 0);
    const idx = parseInt(e.key, 10) - 1;
    if (visibleCats[idx]) {
      currentCat = visibleCats[idx].key;
      writeUrlState();
      render();
    }
    return;
  }
  // 0 → 全部
  if (e.key === "0") {
    currentCat = "all";
    writeUrlState();
    render();
    return;
  }
  // s — 切到收藏
  if (e.key === "s" || e.key === "S") {
    if (starred.size > 0) {
      currentCat = "starred";
      writeUrlState();
      render();
    }
    return;
  }
});

// ---- 啟動 ----
loadStarred();
readUrlState();
load();
</script>
</body>
</html>
