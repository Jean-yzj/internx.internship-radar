name: Update Internship Data

on:
  schedule:
    # 台灣早上 9 點 (01:00 UTC) — 爬蟲 + Discord 通知
    - cron: '0 1 * * *'
    # 台灣下午 2 點、晚上 8 點 (06:00, 12:00 UTC) — 只跑爬蟲
    - cron: '0 6,12 * * *'
  workflow_dispatch:
    inputs:
      notify:
        description: '是否發送 Discord 通知'
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    paths:
      - scrape_internships.py
      - notify_discord.py
      - .github/workflows/scrape.yml

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scrape_internships.py \
            --output data/internships.json \
            --seen data/seen.json \
            --new-output data/new_today.json
        continue-on-error: true  # 即使一個平台掛了也要 commit 其他平台結果

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/internships.json data/seen.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update internship data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Notify Discord (daily 9am TW)
        if: github.event.schedule == '0 1 * * *' || github.event.inputs.notify == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python notify_discord.py data/new_today.json
