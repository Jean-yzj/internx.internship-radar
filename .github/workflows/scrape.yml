name: Update Internship Data

on:
  schedule:
    # 每天台灣時間早上 8 點、下午 2 點、晚上 8 點
    # cron 用 UTC：00:00, 06:00, 12:00 UTC
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:  # 允許手動觸發
  push:
    branches: [main]
    paths:
      - scrape_internships.py
      - .github/workflows/scrape.yml

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_internships.py --output data/internships.json --days 7
        continue-on-error: true  # 即使一個平台掛了也要 commit 其他平台結果

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/internships.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update internship data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
